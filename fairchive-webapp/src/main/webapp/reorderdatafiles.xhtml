<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:jsf="http://xmlns.jcp.org/jsf"
      xmlns:dv="http://dataverse.org/facelets">

<f:view locale="#{dataverseSession.localeCode}" />
    
<h:body>
    <ui:composition template="/dataverse_template.xhtml">
        <ui:param name="page" value="#{ReorderDataFilesPage}" />
        <ui:param name="pageTitle" value="#{page.title}"/>
        <ui:param name="fileMetadatas" value="#{page.fileMetadatas}"/>
        <ui:define name="body">
            <f:metadata>
                <f:viewParam name="datasetVersionId" 
                             value="#{ReorderDataFilesPage.datasetVersionId}"/>
                <f:viewAction action="#{ReorderDataFilesPage.init}"/>
                <f:viewAction
                        action="#{dataverseHeaderFragment.initBreadcrumbs(ReorderDataFilesPage.dataset)}"/>
                <f:viewAction action="#{dataverseHeaderFragment.addBreadcrumb(bundle['file.reorderFiles'])}"/>
            </f:metadata>
            <h:form id="form">
                <!-- Last reorder undo -->
                <p:panel rendered="#{page.displayUndoLastReorder()}"
                         class="undo-last-reorder-panel">
                    <h:outputFormat value="#{bundle['file.reorder.lastReorder']}" 
                                    escape="false">
                                    <f:param value="#{page.lastChange.fileMetadata.label}"/>
                                    <f:param value="#{page.lastChange.fromIndex + 1}"/>
                                    <f:param value="#{page.lastChange.toIndex+ 1}"/>
                    </h:outputFormat>
                    
                    <p:commandButton styleClass="btn btn-default"
                            value="#{bundle.undo}"
                            actionListener="#{page.undoLastReorder()}"
                            update="filesTable @form" />
                </p:panel>
                <!-- Files Table -->
                <p:dataTable id="filesTable"
                             style="margin-right:1px;"
                             value="#{page.fileMetadatas}"
                             sortOrder="ascending"
                             var="fileMetadata" 
                             widgetVar="filesTable"
                             rowIndexVar="rowIndex"
                             draggableRows="true"
                             emptyMessage="#{bundle['file.notFound.tip']}"
                             styleClass="filesTable no-min-width">
                
                    <p:ajax event="rowReorder" 
                            listener="#{page.onRowReorder}"
                            update="@form" />
                    <!-- 'File' column -->
                    <ui:param name="isTabular" value="#{fileMetadata.dataFile.tabularData}" />
                    <p:column headerText="#{bundle.file}">
                        <!-- file name link -->
                         <a href="#{widgetWrapper.wrapURL(page.urlFor(fileMetadata))}">
                            #{fileMetadata.label}
                        </a>
                        <!-- TYPE + SIZE + DATE -->
                        <div class="text-muted small">
                            <h:outputText rendered="#{! isTabular}"
                                          value="#{fileMetadata.dataFile.friendlyType}"/>
                            <h:outputText rendered="#{isTabular}"
                                          value="#{bundle['file.type.tabularData']}"/>
                            <h:outputText value=" - #{fileMetadata.dataFile.friendlySize}"/>
                            <h:outputText rendered="#{fileMetadata.isNew()}"
                                          value=" - #{dv:formatDate(fileMetadata.getFileDateToDisplay())}"/>
                        </div>
                        <!-- UNF + Variables, Observations -->
                        <div jsf:rendered="#{isTabular}"
                             class="text-muted small">
                            <h:outputText value="#{fileMetadata.dataFile.dataTable.varQuantity} #{bundle['file.metaData.dataFile.dataTab.variables']}, "/>
                            <h:outputText value="#{fileMetadata.dataFile.dataTable.caseQuantity} #{bundle['file.metaData.dataFile.dataTab.observations']} #{!empty fileMetadata.dataFile.unf ? ' - ' : ''}"/>
                            <h:outputText rendered="#{!empty fileMetadata.dataFile.unf}"
                                          value="#{fileMetadata.dataFile.unf}"/>
                        </div>
                        <!--  description -->
                        <div jsf:rendered="#{fileMetadata.hasDescription()}"
                             class="fileDescription small">
                            <h:commandLink id="detailstoggle"
                                           value="#{bundle['file.metaData.showDetails']}"
                                           onclick="return hideOrShowDetails(this.id)"
                                           style="width:60px; height: 20px;"/>
                            <h:outputText style="display: none" 
                                          id="fileDescNonEmpty"
                                          value="#{fileMetadata.description}"/>
                        </div>
                        <!-- badges -->
                        <div jsf:rendered="#{fileMetadata.hasCategoriesOrTags()}"
                             class="file-tags-block margin-top-half">
                            <ui:repeat value="#{fileMetadata.categories}"  var="cat">
                                <h:outputText value="#{cat.name}" 
                                              styleClass="label label-default"/>
                            </ui:repeat>
                            <ui:repeat value="#{fileMetadata.dataFile.tags}" var="tag">
                                <h:outputText value="#{tag.typeLabel}" 
                                              styleClass="label label-info"/>
                            </ui:repeat>
                        </div>
                    </p:column>
                    <!--'Actions' column -->
                    <p:column headerText="#{bundle['file.reorder.action.header']}"
                              styleClass="text-center"
                              style="width: calc(6em + 60px);">
                        <p:commandLink rendered="#{(rowIndex gt 0)}"
                                       title="#{bundle['file.reorder.moveToTop']}"
                                       styleClass="btn btn-default btn-sm bootstrap-button-tooltip"
                                       actionListener="#{page.moveToTop(rowIndex)}"
                                       update="filesTable @form">
                            <span class="glyphicon glyphicon-arrow-up no-text"/>
                        </p:commandLink>
                        <p:commandLink rendered="#{(rowIndex gt 0)}"
                                       title="#{bundle['file.reorder.moveUp']}"
                                       styleClass="btn btn-default btn-sm bootstrap-button-tooltip"
                                       actionListener="#{page.moveUp(rowIndex)}"
                                       update="filesTable @form">
                            <span class="glyphicon glyphicon-chevron-up no-text"/>
                        </p:commandLink>
                        <p:commandLink rendered="#{rowIndex lt page.fileMetadatas.size()-1}"
                                       title="#{bundle['file.reorder.moveDown']}"
                                       styleClass="btn btn-default btn-sm bootstrap-button-tooltip"
                                       actionListener="#{page.moveDown(rowIndex)}"
                                       update="filesTable @form">
                            <span class="glyphicon glyphicon-chevron-down no-text"/>
                        </p:commandLink>
                        <p:commandLink rendered="#{rowIndex lt page.fileMetadatas.size()-1}"
                                       title="#{bundle['file.reorder.moveToBottom']}"
                                       styleClass="btn btn-default btn-sm bootstrap-button-tooltip"
                                       actionListener="#{page.moveToBottom(rowIndex)}"
                                       update="filesTable @form">
                            <span class="glyphicon glyphicon-arrow-down no-text"/>
                        </p:commandLink>
                    </p:column>
                </p:dataTable>
                <div class="button-block">
                    <p:commandButton id="save" 
                                     value="#{bundle.saveChanges}"
                                     action="#{page.saveFileOrder}"/>
                    <p:commandButton id="cancel" 
                                     value="#{bundle.cancel}"
                                     styleClass="button-cancel"
                                     action="#{page.returnToPreviousPage}" 
                                     process="@this"
                                     update="@form"
                                     immediate="true"
                                     oncomplete="javascript:post_cancel_edit_files_or_metadata()"/>
                </div>
                
                <p:blockUI block="form" trigger="save" />
                
            </h:form>
            <script type="text/javascript">
                function hideOrShowDetails(id) {
                    let textPosition = id.match("\\d+")[0];
                    let hiddenElements = ['fileDescNonEmpty'];

                    for (let item of hiddenElements) {
                        let obj = document.getElementById("form:filesTable:" + 
                        		textPosition + ":" + item);
                        obj.style.display = obj.style.display === "none" ? "block" : "none";
                    }
                    return false;
                }
            </script>
        </ui:define>
    </ui:composition>
</h:body>
</html>
