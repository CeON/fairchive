<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:c="http://java.sun.com/jsp/jstl/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:o="http://omnifaces.org/ui"
                xmlns:jsf="http://xmlns.jcp.org/jsf"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
                >

    <ui:include src="/WEB-INF/templates/dataset/inputRenderer/fieldLabel.xhtml">
        <ui:param name="for" value="textbox" />
        <ui:param name="datasetFieldType" value="#{datasetField.datasetFieldType}" />
        <ui:param name="hiddenLabel" value="#{hiddenLabel}" />
        <ui:param name="labelFieldNumber" value="#{labelFieldNumber}" />
    </ui:include>

    <p:inputTextarea value="#{datasetField.value}" id="textbox"
                     rows="5" cols="60" styleClass="form-control"
                     pt:data-field-type="#{datasetField.datasetFieldType.name}" />


    <p:watermark for="textbox" value="#{datasetField.datasetFieldType.localeWatermark}"></p:watermark>

    <div class="ui-message ui-message-error ui-widget ui-corner-all" aria-live="polite" jsf:rendered="#{!empty datasetField.validationMessage}">
        <span class="ui-message-error-detail">
            <h:outputText value="#{datasetField.validationMessage}" escape="false"/>
        </span>
    </div>

</ui:composition>
