<ui:composition
        xmlns:h="http://java.sun.com/jsf/html"
        xmlns:ui="http://java.sun.com/jsf/facelets"
        xmlns:p="http://primefaces.org/ui"
        xmlns:jsf="http://xmlns.jcp.org/jsf"
        xmlns:f="http://xmlns.jcp.org/jsf/core">

    <!--@elvariable id="datasetField" type="edu.harvard.iq.dataverse.persistence.dataset.DatasetField"-->
    <!--@elvariable id="inputRenderer" type="edu.harvard.iq.dataverse.dataset.metadata.inputRenderer.SuggestionInputFieldRenderer"-->

    <ui:include src="/WEB-INF/templates/dataset/inputRenderer/fieldLabel.xhtml">
        <ui:param name="for" value="geoname" />
        <ui:param name="datasetFieldType" value="#{datasetField.datasetFieldType}" />
        <ui:param name="hiddenLabel" value="#{hiddenLabel}" />
        <ui:param name="labelFieldNumber" value="#{labelFieldNumber}" />
    </ui:include>

	<div>
		<h:outputFormat value="#{bundle['geonames.serch.hint']}"
			            escape="false"/>
	</div> 
    <p:autoComplete
            id="geoname"
            value="#{datasetField.value}"
            completeMethod="#{inputRenderer.processSuggestionQuery(datasetField)}"
            styleClass="autocomplete-form-control"
            panelStyleClass="autocomplete-panel-maxwidth"
            resultsMessage="#{bundle['common.forms.autocomplete.resultsMessage']}"
            emptyMessage="#{bundle['common.forms.autocomplete.emptySuggestionMessage']}"
            var="suggestion" 
            itemLabel="#{suggestion}" 
            itemValue="#{suggestion.id}"
            autoSelection="false"
            autoHighlight="false"
            maxResults="50"
            queryDelay="700">
        <p:ajax process="@form:@id(fieldsByTypeFragment)" 
                event="focus"  
                update="geoNameDetails"/>

        <p:column style="width: 12em;">
            <h:outputText value="#{suggestion.name}"/>
        </p:column>
        <p:column>
            <h:outputText value="#{suggestion.detailsHTML}" escape="false"/>
        </p:column>
    </p:autoComplete>

    <p:watermark for="geoname"
                 value="#{datasetField.datasetFieldType.localeWatermark}"/>

    <div jsf:id="geoNameDetails">
        <h:outputText value="#{inputRenderer.getDetailsOf(datasetField)}" 
                      escape="false"/>
    </div>

    <div class="ui-message ui-message-error ui-widget ui-corner-all" 
         aria-live="polite"
         jsf:rendered="#{!empty datasetField.validationMessage}">
        <span class="ui-message-error-detail">
            <h:outputText value="#{datasetField.validationMessage}" escape="false"/>
        </span>
    </div>

</ui:composition>
