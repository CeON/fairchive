<ui:composition
        xmlns:h="http://java.sun.com/jsf/html"
        xmlns:f="http://java.sun.com/jsf/core"
        xmlns:ui="http://java.sun.com/jsf/facelets"
        xmlns:c="http://java.sun.com/jsp/jstl/core"
        xmlns:p="http://primefaces.org/ui"
        xmlns:jsf="http://xmlns.jcp.org/jsf"
        xmlns:of="http://omnifaces.org/functions"
        xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">


    <ui:include src="/WEB-INF/templates/dataset/inputRenderer/fieldLabel.xhtml">
        <ui:param name="for" value="inputText" />
        <ui:param name="datasetFieldType" value="#{datasetField.datasetFieldType}" />
        <ui:param name="hiddenLabel" value="#{hiddenLabel}" />
        <ui:param name="labelFieldNumber" value="#{labelFieldNumber}" />
    </ui:include>

    <!-- input text start -->
    <span id="pre-input-#{datasetField.datasetFieldType.name}" class="pre-input-tag"/>

    <c:set var="widgetVar" value="#{mapId}_#{datasetField.datasetFieldType.name}"/>
    <p:inputTextarea value="#{datasetField.value}" id="geoInputTextBox"
                 onchange="
                    this.value = this.value.replace(/,/g, '.');
                    DvJS.Geo.EditView.storeCoordinates('#{mapId}', $(this).val());
                    DvJS.Geo.EditView.updateMap('#{mapId}');"
                 widgetVar="#{widgetVar}"
                 rows="5"
                 pt:data-handler="#{widgetVar}"
                 pt:data-field-type="#{datasetField.datasetFieldType.name}"
                 styleClass="form-control"/>

    <script>
        DvJS.Geo.EditView.putWidgetVar('#{mapId}', 'polygonGeo', '#{widgetVar}');
        var escapedCoordinates = "#{of:escapeJS(datasetField.value)}";
        DvJS.Geo.EditView.storeCoordinates('#{mapId}', escapedCoordinates);
    </script>

    <p:watermark for="geoInputTextBox" value="#{datasetField.datasetFieldType.localeWatermark}"></p:watermark>

    <div class="ui-message ui-message-error ui-widget ui-corner-all" aria-live="polite" jsf:rendered="#{!empty datasetField.validationMessage}">
        <span class="ui-message-error-detail">
            <h:outputText value="#{datasetField.validationMessage}" escape="false"/>
        </span>
    </div>
</ui:composition>
