<ui:composition
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <div class="form-group"
         style="display: flex">
    <p:outputLabel for="periodIdentifier"
                   value="#{bundle['periodo.id']}"
                   style="white-space: pre; margin-right: 4px"/>
    <p:inputText id="periodIdentifier" 
                 style="flex: 1;"
                 value="#{item.id}"/>
    </div>
    <div class="form-group"
         style="display: flex">
    <p:outputLabel for="periodLabel"
                   value="#{bundle['periodo.label']}"
                   style="white-space: pre; margin-right: 4px"/>
    <p:inputText id="periodLabel" 
                 style="flex: 1;"
                 value="#{item.label}"/>
    </div>
    <div class="form-group"
         style="display: flex">
    <p:outputLabel for="periodCoverageName"
                   value="#{bundle['periodo.location.desc']}"
                   style="white-space: pre; margin-right: 4px"/>
    <p:inputText id="periodCoverageName" 
                 style="flex: 1;"
                 value="#{item.coverageName}"/>
    </div>
    <div class="form-group"
         style="display: flex">
    <p:outputLabel for="periodLocation"
                   value="#{bundle['periodo.location']}"
                   style="white-space: pre; margin-right: 4px"/>
 <!--    <p:inputText id="periodLocation" 
                 style="flex: 1;"
                 value="#{item.locations}"/> -->           
    <p:selectCheckboxMenu 
                  id="periodLocation"
                  value="#{item.locations}"
                  style="width: 100%" 
                  panelStyleClass="without-select-all"
                  multiple="true" 
                  label="#{bundle.select}"
                  updateLabel="true"
                  filter="true" 
                  filterMatchMode="contains">
        <f:selectItems value="#{item.allLocations}"
                    var="l"
                   itemLabel="#{l}"
                   itemValue="#{l}"/>
    </p:selectCheckboxMenu>            
    </div>
    <div class="form-group"
         style="display: flex">  
    <p:outputLabel value="#{bundle['periodo.start']}"
                   style="white-space: pre; margin-right: 4px"/>  
    <p:outputLabel for="periodStartEarliest"
                   value="#{bundle['periodo.from']}"
                   style="white-space: pre; margin-right: 4px"/>
    <p:inputText id="periodStartEarliest"
                 value="#{item.startEarliest}"/> 
    <p:outputLabel for="periodStartLatest"
                   value="#{bundle['periodo.to']}"
                   style="white-space: pre; margin-left: 5px; margin-right: 4px"/>
    <p:inputText id="periodStartLatest"
                 value="#{item.startLatest}"/>   
    </div>
    <div class="form-group"
         style="display: flex">
    <p:outputLabel value="#{bundle['periodo.end']}"
                   style="white-space: pre; margin-right: 4px"/>
    <p:outputLabel for="periodStopEarliest"
                   value="#{bundle['periodo.from']}"
                   style="white-space: pre; margin-right: 4px"/>
    <p:inputText id="periodStopEarliest"
                 value="#{item.stopEarliest}"/> 
    <p:outputLabel for="periodStopLatest"
                   value="#{bundle['periodo.to']}"
                   style="white-space: pre; margin-left: 5px; margin-right: 4px"/>
    <p:inputText id="periodStopLatest"
                 value="#{item.stopLatest}"/>   
    </div>
    <div class="form-group"
         style="display: flex">             
    <p:outputLabel for="periodAutorityTitle"
                   value="#{bundle['periodo.authority']}"
                   style="white-space: pre; margin-right: 4px"/>
    <p:inputText id="periodAutorityTitle" 
                 style="flex: 1;"
                 value="#{item.authorityTitle}"/>
    </div>
</ui:composition>
