<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:jsf="http://xmlns.jcp.org/jsf" 
	xmlns:p="http://primefaces.org/ui"
	>
<h:head>
    <style>
    .column1 { width: 20%; }
    .column2 { width: 70%; }
    .column3 { width: 10%; }
    </style>
</h:head>

<h:body>
	<f:metadata>
		<f:viewParam name="dataverseId"
			value="#{dataverseDao.findRootDataverse().id}" />
		<f:viewAction action="#{dataverseSession.updateLocaleInViewRoot}" />
		<f:viewAction action="#{ExportSearchResultsPage.verifyAccess()}" />
		<f:viewAction
			action="#{dataverseHeaderFragment.initBreadcrumbs(dataverseDao.findRootDataverse())}" />
		<f:viewAction
			action="#{dataverseHeaderFragment.addBreadcrumb('/dashboard.xhtml?dataverseId='.concat(dataverseDao.findRootDataverse().getId()), bundle['dashboard.title'])}" />
		<f:viewAction
			action="#{dataverseHeaderFragment.addBreadcrumb(bundle['dashboard.card.exportsearchresults.manage'])}" />
	</f:metadata>

	<ui:composition template="/dataverse_template.xhtml">
		<ui:param name="pageTitle"
			value="#{bundle['dashboard.card.exportsearchresults.header']} - #{dataverseDao.findRootDataverse().name} #{bundle.dataverse}" />
		<ui:param name="showDataverseHeader" value="false" />
		<ui:define name="body">
			<h:form id="dashboardExportSearchResultsForm"
				onkeypress="return event.keyCode != 13">
				<div class="panel-group" jsf:id="maximumEmbargoBlockHeader">
					<div class="panel panel-default">
						<div class="collapse in">
							<div class="panel-body">
								<div class="form-group">
									<p:dataTable value="#{ExportSearchResultsPage.fieldTypes}" var="mt"  >
										<p:column width="20%" 
										          headerText="#{bundle['dashboard.card.exportsearchresults.name']}">
    										<h:outputText value="#{mt.title}"/>
										</p:column>
										<p:column width="70%" 
										          headerText="#{bundle['dashboard.card.exportsearchresults.desc']}">
                                            <h:outputText value="#{mt.description}"/>
                                        </p:column>
										<p:column width="10%" 
										          headerText="#{bundle['dashboard.card.exportsearchresults.exported']}">
										    <p:selectBooleanCheckbox value="#{mt.exportToFile}"/>
										</p:column>
									</p:dataTable>
								</div>
							</div>
						</div>
					</div>
				</div>

				<!-- Bottom action buttons -->
				<div class="button-block">
					<p:commandButton id="save" styleClass="btn btn-default"
						value="#{bundle.saveChanges}"
						action="#{ExportSearchResultsPage.save}"
						update="@form,:messagePanel," />
					<p:commandButton id="cancel" styleClass="btn btn-default"
						value="#{bundle.cancel}"
						action="#{ExportSearchResultsPage.cancel}" process="@this">
						<p:resetInput target="@form" />
					</p:commandButton>
				</div>

			</h:form>
		</ui:define>
	</ui:composition>

</h:body>
</html>
