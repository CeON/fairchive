
services:

  smtp:
    image: "mailhog/mailhog:v1.0.1"
    container_name: "fairchive-dev-smtp"
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8025" ]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: "postgres:12-alpine"
    container_name: "fairchive-dev-postgres"
    ports:
      - "5432:5432"
    volumes:
      - "postgres-data:/var/lib/postgresql/data:rw"
    environment:
      - "POSTGRES_USER=postgres"
      - "POSTGRES_PASSWORD=dataverse"
    healthcheck:
      test: [ "CMD", "pg_isready",  "-U", "postgres" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres-setup:
    build: "./postgres-setup"
    image: "fairchive-postgres-setup:${BUILD_VERSION}"
    container_name: "fairchive-dev-postgres-setup"
    volumes:
      - "${DATAVERSE_SOURCE_DIR}:/fairchive:rw"
    depends_on:
      postgres:
        condition: service_healthy

  solr:
    build: "./solr/7.3.1"
    image: "solr:${BUILD_VERSION}"
    container_name: "fairchive-dev-solr"
    ports:
      - "8983:8983"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8983/solr/collection1/admin/ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  keycloak:
    hostname: "local.keycloak"
    image: "quay.io/keycloak/keycloak:24.0.2"
    container_name: "fairchive-dev-keycloak"
    ports:
      - "7070:7070"
    environment:
      - "KEYCLOAK_ADMIN=admin"
      - "KEYCLOAK_ADMIN_PASSWORD=admin"
      - "KC_HOSTNAME=local.keycloak"
      - "KC_HOSTNAME_ADMIN=local.admin.keycloak"
    command: ["start-dev", "--http-port=7070"]

  payara:
    build: "./payara"
    image: "fairchive-payara:${BUILD_VERSION}"
    container_name: "fairchive-dev-payara"
    ports:
      - "8080:8080"
      - "4848:4848"
      - "9009:9009"
      - "8686:8686"
      - "8786:8786"
      - "1099:1099"
    volumes:
      - "${DATAVERSE_SOURCE_DIR}:/fairchive:rw"
      - "gl-payara-domain-data:/opt/payara/appserver/glassfish/domains/domain1:rw"
      - "gl-payara-server-data:/srv/glassfish:rw"
      - "gl-payara-home:/opt/payara:rw"
    environment:
      - "CONTAINER_WORKING_DIR=${DATAVERSE_CONTAINER_WORKING_DIR}"
    post_start:
      - command: ["/opt/payara/scripts/postboot_setup.sh"]
        user: "payara"
    depends_on:
      postgres:
        condition: service_healthy
      solr:
        condition: service_healthy
      smtp:
        condition: service_healthy

  prometheus:
    image: "prom/prometheus:v3.1.0"
    container_name: "fairchive-dev-prometheus"
    ports:
      - "9090:9090"
    volumes:
      - "${DATAVERSE_SOURCE_DIR}/conf/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"

  grafana:
    image: "grafana/grafana:11.4.0"
    container_name: "fairchive-dev-grafana"
    ports:
      - "3000:3000"
    environment:
      - "GF_SECURITY_ADMIN_PASSWORD=admin"
    volumes:
      - ${DATAVERSE_SOURCE_DIR}/conf/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/main.yaml
      - ${DATAVERSE_SOURCE_DIR}/conf/grafana/datasources.yml:/etc/grafana/provisioning/datasources/main.yaml
      - ${DATAVERSE_SOURCE_DIR}/conf/grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  postgres-data:
  gl-payara-domain-data:
  gl-payara-server-data:
  gl-payara-home:
