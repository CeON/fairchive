role.admin.name=Admin
role.admin.description=A person who has all permissions for collections, datasets, and files.
role.editor.name=Contributor
role.editor.description=For datasets, a person who can edit License + Terms, and then submit them for review.
role.curator.name=Curator
role.curator.description=For datasets, a person who can edit License + Terms, edit Permissions, and publish datasets.
role.dscontributor.name=Dataset Creator
role.dscontributor.description=A person who can add datasets within a collection.
role.fullcontributor.name=Collection + Dataset Creator
role.fullcontributor.description=A person who can add subcollections and datasets within a collection.
role.dvcontributor.name=Collection Creator
role.dvcontributor.description=A person who can add subcollections within a collection.
role.filedownloader.name=File Downloader
role.filedownloader.description=A person who can download a published file.
role.member.name=Member
role.member.description=A person who can view both unpublished collections and datasets.
role.depositor.name=Depositor
role.depositor.description=A person who can add and edit datasets, as well as manage minor permissions for datasets.